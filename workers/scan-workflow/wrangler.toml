# SMD Services — scan-workflow Worker (#618)
#
# Hosts the Cloudflare Workflows class for the Engine 1 /scan diagnostic
# pipeline. Lives in its own Worker because Astro's @astrojs/cloudflare
# adapter rewrites the parent `wrangler.toml` at build time and was
# observed in production to leave `env.SCAN_WORKFLOW` undefined on the
# `ss-web` Worker — even though the build artifact's `wrangler.json`
# contained the binding entry. Co-locating the Workflow with a vanilla
# Worker entrypoint (no Astro build pipeline) is the durable fix: the
# `[[workflows]]` block below is the only definition Cloudflare sees, and
# `wrangler workflows list` confirms the binding is attached to this
# script rather than `ss-web`.
#
# `ss-web` invokes this Worker through a service binding (see root
# `wrangler.toml` `[[services]]` block) by POSTing to the internal
# `/dispatch` endpoint with a `scanRequestId`. The endpoint creates a
# Workflow instance via `env.SCAN_WORKFLOW.create({...})` and returns
# the instance id, which `ss-web` persists to `scan_requests.workflow_run_id`.
#
# Manual trigger path is preserved:
#   npx wrangler workflows trigger scan-diagnostic --params '{"scanRequestId":"…"}'
# still works against this script (the binding now lives here, not on ss-web).

name = "ss-scan-workflow"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Same D1 database as ss-web — the Workflow reads/writes scan_requests,
# entities, context. Single source of truth.
[[d1_databases]]
binding = "DB"
database_name = "ss-console-db"
database_id = "65171b23-d615-42a7-84e7-a4fac20d063c"

# Workflows binding for this Worker. Cloudflare resolves
# `class_name = "ScanDiagnosticWorkflow"` against the named export from
# `src/index.ts`. The binding is `SCAN_WORKFLOW` so the dispatch handler's
# `env.SCAN_WORKFLOW.create(...)` resolves at runtime.
[[workflows]]
name = "scan-diagnostic"
binding = "SCAN_WORKFLOW"
class_name = "ScanDiagnosticWorkflow"

[observability]
enabled = true

# Non-secret env vars. APP_BASE_URL is the origin used by outbound URL
# builders inside the workflow (booking links in the report email, magic-
# link URLs for Outside View delivery). Must match the production origin
# the email recipient will click into. Not a secret — committing the value
# is fine.
[vars]
APP_BASE_URL = "https://smd.services"

# ---------- Secrets (set via `wrangler secret put` or `wrangler secret bulk`) ----------
# All secrets are set per-Worker. Captain provisions these from Infisical
# after first deploy:
#
#   infisical export --env=prod --path=/ss --format=dotenv \
#     | grep -E '^(RESEND_API_KEY|ANTHROPIC_API_KEY|GOOGLE_PLACES_API_KEY|OUTSCRAPER_API_KEY|LEAD_INGEST_API_KEY)=' \
#     | npx wrangler secret bulk --name ss-scan-workflow
#
# RESEND_API_KEY          — Resend transactional email (report + thin-footprint + admin alert)
# ANTHROPIC_API_KEY       — Claude API (website_analysis, review_synthesis, deep_website, intelligence_brief)
# GOOGLE_PLACES_API_KEY   — Google Places lookup (Tier 1 contact data)
# OUTSCRAPER_API_KEY      — Outscraper business profile + reviews (Tier 1 contact data)
# LEAD_INGEST_API_KEY     — Bearer token guarding the internal /dispatch endpoint
