# SMD Services — Cloudflare Pages project configuration
# Single Astro app serving marketing site, admin, and client portal.
# See PRD Section 10: Architecture & Technical Design.
#
# Custom domains (configured in Cloudflare Pages dashboard):
#   smd.services         — marketing site (public pages)
#   portal.smd.services  — client portal
#
# All domains are served by this single Pages project.
# Routing is handled by Astro middleware, not separate deployments.

name = "ss-web"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# ---------- Public env vars ----------
# Canonical origin for outbound auth, portal, and webhook callback URLs.
# All email links and webhook callbacks are built from APP_BASE_URL — never
# from the inbound request host (see src/lib/config/app-url.ts and issue #173).
# PORTAL_BASE_URL is optional; when unset it falls back to APP_BASE_URL.
[vars]
APP_BASE_URL = "https://smd.services"
PORTAL_BASE_URL = "https://portal.smd.services"

# ---------- D1 (structured data) ----------
[[d1_databases]]
binding = "DB"
database_name = "ss-console-db"
database_id = "65171b23-d615-42a7-84e7-a4fac20d063c"

# ---------- R2 (documents, transcripts, SOWs) ----------
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ss-console-storage"

# ---------- Workers KV (sessions) ----------
[[kv_namespaces]]
binding = "SESSIONS"
id = "4570dcc1e154476f889bc9fcfc28b2b9"

# ---------- Secrets (set via wrangler secret put) ----------
# All secrets are set per-project. Workers have their own copies.
#
# RESEND_API_KEY          — Resend transactional email
# ANTHROPIC_API_KEY       — Claude API (outreach gen, website analysis, dossier)
# GOOGLE_PLACES_API_KEY   — Google Places Text Search (enrichment)
# OUTSCRAPER_API_KEY      — Outscraper business profile + email enrichment
# SERPAPI_API_KEY          — SerpAPI Google Search (news/press enrichment)
# LEAD_INGEST_API_KEY     — Bearer token for pipeline Worker ingestion
# SIGNWELL_API_KEY        — SignWell e-signature
# SIGNWELL_WEBHOOK_SECRET — SignWell webhook verification
# STRIPE_API_KEY          — Stripe invoicing
# STRIPE_WEBHOOK_SECRET   — Stripe webhook verification
# PROXYCURL_API_KEY       — LinkedIn company data (optional, Tier 4 dossier)
#
# Set with: npx wrangler secret put SECRET_NAME
# In dev: add to .dev.vars (gitignored)
