# SMD Services — Cloudflare Workers + Static Assets
# Single Worker serving marketing (smd.services), admin (admin.smd.services),
# and portal (portal.smd.services) via Astro SSR middleware.
#
# Custom domains (added in the Cloudflare dashboard → Workers & Pages → ss-web
# → Domains → Custom Domain):
#   smd.services         — marketing site (public pages)
#   admin.smd.services   — admin console
#   portal.smd.services  — client portal
#
# All three hostnames hit this single Worker. Subdomain routing happens in
# src/middleware.ts via hostname inspection.

name = "ss-web"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ---------- Static assets ----------
# The @astrojs/cloudflare v13 adapter emits the Astro client build to dist/
# and a Worker entry resolved from the `main` module specifier above. The
# Worker must run first on every request for subdomain rewriting + session
# middleware to execute — otherwise the asset binding would short-circuit
# `/` before the Astro SSR handler sees it.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

# ---------- Public env vars ----------
# Canonical origins for outbound links and webhook callbacks. Built from
# these env vars — never from the inbound request host (see
# src/lib/config/app-url.ts and issue #173).
#
# Unlike Pages, Workers treats [vars] and secrets as independent namespaces.
# `wrangler deploy` does NOT touch secrets set via `wrangler secret put`, so
# the Pages-era sync-pages-secrets.sh workaround is no longer needed.
[vars]
APP_BASE_URL = "https://smd.services"
ADMIN_BASE_URL = "https://admin.smd.services"
PORTAL_BASE_URL = "https://portal.smd.services"
MEETING_URL = "https://zoom.us/j/4284801619"

# Generator worker endpoints — invoked by /admin/generators "Run now" button.
# Bearer-authed via LEAD_INGEST_API_KEY (secret). Set via `wrangler secret put`.
NEW_BUSINESS_WORKER_URL = "https://ss-new-business.automation-ab6.workers.dev"
JOB_MONITOR_WORKER_URL = "https://ss-job-monitor.automation-ab6.workers.dev"
REVIEW_MINING_WORKER_URL = "https://ss-review-mining.automation-ab6.workers.dev"
SOCIAL_LISTENING_WORKER_URL = "https://ss-social-listening.automation-ab6.workers.dev"

# Feature flag for the public /patterns aggregate page. Off by default.
# Flip to "1" or "true" only after the unlock condition documented in
# src/pages/patterns.astro is met (>=20 real assessments with cross-vertical
# diversity, per CLAUDE.md no-fabrication rule). Any other value keeps the
# page returning 404.
ENABLE_PUBLIC_PATTERNS = "0"

# ---------- D1 (structured data) ----------
[[d1_databases]]
binding = "DB"
database_name = "ss-console-db"
database_id = "65171b23-d615-42a7-84e7-a4fac20d063c"

# ---------- R2 (documents, transcripts, SOWs) ----------
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "ss-console-storage"

# ---------- R2 (consultant photos, public) ----------
# Intended to be a public bucket — object URLs are served directly to the
# portal. Create with: npx wrangler r2 bucket create smd-consultant-photos
# Then enable public access in the Cloudflare dashboard and set the resulting
# public base URL via: npx wrangler secret put CONSULTANT_PHOTOS_PUBLIC_BASE
[[r2_buckets]]
binding = "CONSULTANT_PHOTOS"
bucket_name = "smd-consultant-photos"

# ---------- Workers KV (sessions) ----------
[[kv_namespaces]]
binding = "SESSIONS"
id = "4570dcc1e154476f889bc9fcfc28b2b9"

# ---------- Workers KV (booking rate-limit buckets) ----------
# Used by /api/booking/reserve for IP-based rate limiting only.
# No slot cache in v1 (see plan §No availability cache in v1).
[[kv_namespaces]]
binding = "BOOKING_CACHE"
id = "daf6a3220f8f42f28f3da7e82f663088"

# ---------- Observability ----------
[observability]
enabled = true

# ---------- Staging environment ----------
# Used for pre-cutover validation on a workers.dev hostname. Deploy with:
#   wrangler deploy --env staging
# Reuses prod bindings (same D1/R2/KV) — flip to separate resources when we
# need data isolation for staging.
[env.staging]
name = "ss-web-staging"

# ---------- Secrets (set via `wrangler secret put` or `wrangler secret bulk`) ----------
# All secrets are set per-Worker. Persist across `wrangler deploy` natively —
# no sync script needed.
#
# RESEND_API_KEY          — Resend transactional email
# ANTHROPIC_API_KEY       — Claude API (outreach gen, website analysis, dossier)
# GOOGLE_PLACES_API_KEY   — Google Places Text Search (enrichment)
# OUTSCRAPER_API_KEY      — Outscraper business profile + email enrichment
# SERPAPI_API_KEY         — SerpAPI Google Search (news/press enrichment)
# LEAD_INGEST_API_KEY     — Bearer token for pipeline Worker ingestion
# SIGNWELL_API_KEY        — SignWell e-signature
# SIGNWELL_WEBHOOK_SECRET — SignWell webhook verification
# STRIPE_API_KEY          — Stripe invoicing
# STRIPE_WEBHOOK_SECRET   — Stripe webhook verification
# PROXYCURL_API_KEY       — LinkedIn company data (optional, Tier 4 dossier)
#
# Booking system (Calendly replacement) — added in migration 0011 era:
# GOOGLE_CLIENT_ID         — Google Cloud OAuth 2.0 client ID
# GOOGLE_CLIENT_SECRET     — Google Cloud OAuth 2.0 client secret
# BOOKING_ENCRYPTION_KEY   — 32-byte base64 random; AES-GCM encryption of refresh tokens
# TURNSTILE_SECRET_KEY     — Cloudflare Turnstile secret (paired with PUBLIC_TURNSTILE_SITE_KEY)
#
# Bulk-load from Infisical:
#   infisical export --env=prod --path=/ss --format=dotenv \
#     | grep -vE '^(APP_|ADMIN_|PORTAL_|MEETING_|NEW_BUSINESS_|JOB_MONITOR_|REVIEW_MINING_|PUBLIC_)' \
#     | npx wrangler secret bulk
