<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Invoice - SMD Services</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

    <link

      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'surface-bright': '#faf8ff',
              'on-error-container': '#93000a',
              'on-tertiary': '#ffffff',
              'on-secondary-fixed-variant': '#004395',
              'primary-container': '#1e40af',

              'outline-variant': '#c4c5d5',
              'on-primary-fixed': '#001453',
              'secondary-container': '#2170e4',
              'tertiary-fixed-dim': '#c0c1ff',
              'surface-container-lowest': '#ffffff',
              'on-tertiary-fixed': '#07006c',
              'error-container': '#ffdad6',
              'tertiary-container': '#3433c3',
              'surface-dim': '#d2d9f4',
              'tertiary-fixed': '#e1e0ff',
              'primary-fixed-dim': '#b8c4ff',
              'surface-container-highest': '#dae2fd',
              'on-surface-variant': '#444653',
              outline: '#757684',
              'surface-variant': '#dae2fd',
              'inverse-on-surface': '#eef0ff',
              'on-primary': '#ffffff',
              tertiary: '#170cae',
              'on-secondary-container': '#fefcff',
              'on-tertiary-container': '#b3b5ff',
              error: '#ba1a1a',
              'surface-container-high': '#e2e7ff',
              'primary-fixed': '#dde1ff',
              'on-tertiary-fixed-variant': '#2f2ebe',
              'on-primary-fixed-variant': '#173bab',
              'on-secondary': '#ffffff',
              'on-background': '#131b2e',
              'secondary-fixed': '#d8e2ff',
              'secondary-fixed-dim': '#adc6ff',
              background: '#faf8ff',
              'inverse-primary': '#b8c4ff',
              'on-primary-container': '#a8b8ff',
              'surface-container': '#eaedff',
              'on-surface': '#131b2e',
              'on-error': '#ffffff',
              'inverse-surface': '#283044',
              'surface-tint': '#3755c3',
              'surface-container-low': '#f2f3ff',
              surface: '#faf8ff',
              primary: '#00288e',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
            fontFamily: {
              headline: ['Plus Jakarta Sans'],
              body: ['Inter'],
              label: ['Inter'],
            },
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
      body {
        background-color: #faf8ff;
        -webkit-font-smoothing: antialiased;
      }
      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #00288e 0%, #1e40af 100%);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body class="font-body text-on-surface">
    <!-- TopAppBar from JSON Logic -->
    <header
      class="bg-[#faf8ff] flex justify-between items-center px-6 py-4 w-full max-w-[390px] mx-auto sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <span class="font-medium text-[13px] leading-[18px] text-[#0F172A]">Delgado Plumbing</span>
      </div>
      <!-- Spacer for center alignment feel -->
    </header>
    <main class="w-full max-w-[390px] mx-auto px-6 pt-10 pb-20">
      <!-- Hero Section: Above the Fold -->
      <section class="mb-12">
        <p class="text-label text-[14px] font-medium text-[#6366F1] mb-1">Invoice due Friday</p>
        <h1
          class="font-headline font-extrabold text-[64px] leading-tight tracking-tighter text-on-surface"
        >
          $4,250
        </h1>
        <p class="text-[14px] text-[#6366F1] font-medium mt-2">Invoice #1023 • Due Apr 18</p>
      </section>
      <!-- CTA Section -->
      <section class="mb-14">
        <button
          class="w-full signature-gradient text-white font-bold py-5 px-8 rounded-xl shadow-lg shadow-primary/10 active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2"
        >
          Pay invoice
          <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
        </button>
        <div class="flex items-center justify-center gap-2 mt-4 opacity-60">
          <span class="material-symbols-outlined text-sm" data-icon="lock" style="font-size: 14px"
            >lock</span
          >
          <p class="text-[12px] font-medium">Secured by Stripe</p>
        </div>
      </section>
      <!-- Summary Section: Bento/Editorial Style -->
      <section class="mb-12">
        <h2 class="font-headline font-bold text-[20px] mb-6 text-on-surface">What's included</h2>
        <div class="space-y-6">
          <div class="flex justify-between items-center group">
            <span class="text-[16px] text-on-surface-variant font-medium">Assessment</span>
            <span class="text-[16px] font-semibold tabular-nums text-on-surface">$2,750</span>
          </div>
          <div class="flex justify-between items-center group">
            <span class="text-[16px] text-on-surface-variant font-medium">Call script</span>
            <span class="text-[16px] font-semibold tabular-nums text-on-surface">$900</span>
          </div>
          <div class="flex justify-between items-center group">
            <span class="text-[16px] text-on-surface-variant font-medium">Training</span>
            <span class="text-[16px] font-semibold tabular-nums text-on-surface">$600</span>
          </div>
        </div>
        <!-- Surface Tonal Layer for Total -->
        <div
          class="mt-8 pt-8 border-t border-outline-variant/15 flex justify-between items-baseline"
        >
          <span class="text-[14px] font-bold uppercase tracking-widest text-[#6366F1]">Total</span>
          <span class="text-[24px] font-headline font-extrabold text-on-surface tabular-nums"
            >$4,250.00</span
          >
        </div>
      </section>
      <!-- Consultant Module: Glassmorphism/Surface Nesting -->
      <section
        class="bg-surface-container-lowest p-6 rounded-2xl shadow-sm ring-1 ring-on-surface/5 flex flex-col gap-5"
      >
        <div class="flex items-center gap-4">
          <div class="relative">
            <img
              alt="Scott Durgan"
              class="w-14 h-14 rounded-full object-cover grayscale-[0.2]"
              data-alt="professional headshot of a mature man with a friendly smile, clean studio background, soft cinematic lighting"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrB_l0jRDQ2gaTt2YzytyM4kpCJpdz5SGRbhO0qK-rsrRuz-0nBPS9kglAS4VGAN9ZWa945eAi7mPU3FM4ZxA96O8SVfsNKjOIegdgTviTM3csfBdmazoAgYtwquEehdFuMmYFqupicAlxJQY5WMa7Px1bNjzDsL8VRoJwE7mrvsAB7LWCqDykoGkUyIuC3PxmTuoLai2xBOyJow1RNvWI0AuJQ0D_7f8uOc28UjlWHQ6U3uAcdkYb-8wNkLK4o7GiW2UGtY66gJFq"
            />
            <div
              class="absolute bottom-0 right-0 w-4 h-4 bg-emerald-500 border-2 border-white rounded-full"
            ></div>
          </div>
          <div>
            <h3 class="font-bold text-[16px]">Scott Durgan</h3>
            <p class="text-[13px] text-on-surface-variant">Consultant, SMD Services</p>
          </div>
        </div>
        <div class="bg-surface-container-low p-4 rounded-xl">
          <div class="flex items-center gap-3 text-[#6366F1]">
            <span class="material-symbols-outlined text-[18px]" data-icon="event">event</span>
            <p class="text-[13px] font-semibold">Next check-in Wednesday 10am</p>
          </div>
        </div>
        <button
          class="w-full bg-surface-container-high hover:bg-[#d8defa] text-primary font-bold py-4 px-6 rounded-xl transition-colors duration-200 flex items-center justify-center gap-2"
        >
          <span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
          Text Scott
        </button>
      </section>
      <!-- Footer from JSON Logic -->
    </main>
  </body>
</html>
