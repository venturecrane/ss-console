name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 13:00 UTC (06:00 Phoenix) so new advisories surface before the workday
    - cron: '0 13 * * *'

jobs:
  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so npm ci can fetch @venturecrane/crane-test-harness from
      # GitHub Packages via the workflow's GITHUB_TOKEN.
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@venturecrane'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Audit (fail on high or critical)
        run: npm audit --audit-level=high
