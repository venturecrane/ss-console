name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    # Only deploy when Cloudflare secrets are configured
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      deployments: write
      # Required so npm ci can fetch @venturecrane/crane-test-harness from
      # GitHub Packages via the workflow's GITHUB_TOKEN.
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@venturecrane'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Build
        run: npm run build

      # Dry-run catches wrangler config / binding errors before they hit prod.
      - name: Wrangler deploy (dry-run)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --dry-run

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # Secrets persist across `wrangler deploy` on Workers — no post-deploy
      # sync step needed. Rotate out-of-band with:
      #   infisical export --env=prod --path=/ss --format=dotenv \
      #     | grep -vE '^(APP_|ADMIN_|PORTAL_|MEETING_|NEW_BUSINESS_|JOB_MONITOR_|REVIEW_MINING_|PUBLIC_)' \
      #     | npx wrangler secret bulk

      - name: Run D1 migrations
        if: ${{ vars.D1_MIGRATIONS_ENABLED == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply ss-console-db --remote

      # The root `wrangler deploy` writes `.wrangler/deploy/config.json`
      # pointing at the adapter-generated `dist/server/wrangler.json`.
      # Sub-worker deploys discover it when searching upward and fail with
      # "Found both a user configuration file and a deploy configuration
      # file." Remove before subsequent sub-worker steps.
      - name: Clean root wrangler state
        run: rm -rf .wrangler

      - name: Install Job Monitor Worker deps
        run: cd workers/job-monitor && npm ci

      - name: Deploy Job Monitor Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/job-monitor
          command: deploy

      - name: Install New Business Worker deps
        run: cd workers/new-business && npm ci

      - name: Deploy New Business Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/new-business
          command: deploy

      - name: Install Review Mining Worker deps
        run: cd workers/review-mining && npm ci

      - name: Deploy Review Mining Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/review-mining
          command: deploy

      - name: Install Social Listening Worker deps
        run: cd workers/social-listening && npm ci

      - name: Deploy Social Listening Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/social-listening
          command: deploy
