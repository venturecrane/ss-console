name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck, Lint, Format, Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so npm ci can fetch @venturecrane/crane-test-harness from
      # GitHub Packages via the workflow's GITHUB_TOKEN.
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@venturecrane'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Workers
        run: npm run typecheck:workers

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build Job Monitor Worker
        run: cd workers/job-monitor && npm ci && npx wrangler deploy --dry-run --outdir=dist

      - name: Build New Business Worker
        run: cd workers/new-business && npm ci && npx wrangler deploy --dry-run --outdir=dist

      - name: Build Review Mining Worker
        run: cd workers/review-mining && npm ci && npx wrangler deploy --dry-run --outdir=dist

      # NOTE: workers/social-listening is not built or deployed here. It has
      # never been deployed to prod — CI-verifying undeployed code creates
      # false confidence and masks drift. See venture-tracked issue for
      # Pipeline 4 first-deploy (secrets provisioning, dry-run via /run,
      # digest-routing review). Re-add the build step when that issue ships.
